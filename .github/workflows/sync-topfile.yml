name: sync-topfile

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild dictionaries from src/
        run: python3 scripts/build_release.py
      - name: Commit regenerated top-level files if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate top-level dictionaries from src/"
          file_pattern: |
            WindowsIME/DMiME-1.1.txt
            Mac/DMiME1.1 igakujisho for icloud.plist
