name: verify-split

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild dictionaries from src/
        run: python3 scripts/build_release.py
      - name: Validate plist
        run: python3 -c "import plistlib, sys; plistlib.loads(open('Mac/DMiME1.1 igakujisho for icloud.plist', 'rb').read())"
      - name: Ensure top-level files match src/
        run: |
          if ! git diff --quiet -- WindowsIME Mac; then
            echo "::error::Top-level dictionaries are out of sync with src/."
            echo "Run 'python3 scripts/build_release.py' locally and commit the result."
            git --no-pager diff --stat -- WindowsIME Mac
            exit 1
          fi
